services:
  - type: web
    name: smart-batch-downloader-api
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && which yt-dlp || pip install yt-dlp
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MAX_CONCURRENT
        value: 2
      - key: MAX_URLS_PER_BATCH
        value: 15
      - key: TEMP_DIR
        value: /tmp/batch-dl
      - key: ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /health
    autoDeploy: true
